<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 DeepSeek 用量看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#0a0a0f;color:#e0e0e8;min-height:100vh;padding:16px}
.container{max-width:640px;margin:0 auto}

/* Header */
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4ade80,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:#555;margin-top:4px}
.header .status{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;margin-top:6px}
.status.online{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.status.offline{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}

/* Balance Section */
.balance-section{background:linear-gradient(135deg,#0d1f1a,#0a0a1a);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:24px;margin-bottom:16px;text-align:center}
.balance-section .label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px}
.balance-section .amount{font-size:44px;font-weight:800;color:#4ade80;margin:4px 0 2px;letter-spacing:-2px}
.balance-section .amount .cur{font-size:28px;font-weight:300;color:#4ade80;opacity:.7}
.balance-section .meta{display:flex;justify-content:center;gap:24px;margin-top:8px;font-size:11px;color:#555}
.balance-section .meta span{display:flex;align-items:center;gap:4px}
.balance-section .meta .val{color:#888}

/* Stat Grid */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#14141f;border:1px solid #1e1e2e;border-radius:14px;padding:14px 12px}
.stat-card .l{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.stat-card .v{font-size:18px;font-weight:700;margin-top:4px}
.stat-card .s{font-size:10px;color:#444;margin-top:2px}
.stat-card.c1 .v{color:#f59e0b}
.stat-card.c2 .v{color:#60a5fa}
.stat-card.c3 .v{color:#a78bfa}

/* Chart Section */
.section-title{font-size:13px;font-weight:600;color:#666;margin:18px 0 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #14141f;padding-bottom:8px}
.chart-card{background:#14141f;border:1px solid #1e1e2e;border-radius:16px;padding:16px;margin-bottom:16px;min-height:120px}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-header .tl{font-size:11px;color:#666;font-weight:500}
.chart-header .tl .hl{color:#888}
.chart-header .badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#1e1e2e;color:#555}

/* Bar Chart */
.bar-list{display:flex;flex-direction:column}
.bar-row{display:flex;align-items:center;gap:6px;padding:4px 0;min-height:30px}
.bar-row .b-bal{font-size:12px;font-weight:600;min-width:56px;text-align:right}
.bar-row .b-time{font-size:11px;color:#555;min-width:42px;text-align:center;font-weight:500}
.bar-row .b-track{flex:1;height:18px;background:#1a1a28;border-radius:4px;overflow:hidden;min-width:60px}
.bar-row .b-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-row .b-drop{font-size:12px;font-weight:600;min-width:50px;text-align:right}
.bar-row.row-first .b-bal,.bar-row.row-first .b-time{color:#444}
.bar-row.row-first .b-drop{color:#333}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.info-item{background:#14141f;border:1px solid #1e1e2e;border-radius:12px;padding:12px}
.info-item .il{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.info-item .iv{font-size:14px;font-weight:600;margin-top:3px}

/* History Table */
.history-card{background:#14141f;border:1px solid #1e1e2e;border-radius:16px;padding:16px;margin-bottom:16px}
.history-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #0f0f18;font-size:12px}
.history-row:last-child{border-bottom:none}
.history-row .h-time{color:#666}
.history-row .h-bal{font-weight:600;color:#4ade80}
.history-row .h-drop{color:#f59e0b}

/* Footer */
.footer{text-align:center;padding:12px 0;font-size:10px;color:#222;border-top:1px solid #111}
.footer .dot{color:#4ade80}

/* Empty */
.empty{text-align:center;padding:30px;color:#333;font-size:13px}

@media(max-width:480px){
  .stat-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-card{padding:10px}
  .balance-section .amount{font-size:36px}
  .balance-section .amount .cur{font-size:22px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦐 DeepSeek 用量</h1>
    <div class="sub" id="headerSub">加载中...</div>
    <div class="status" id="statusBadge">● 连接中</div>
  </div>

  <!-- 余额 -->
  <div class="balance-section">
    <div class="label">💰 账户余额</div>
    <div class="amount"><span class="cur">¥</span><span id="balAmount">0.00</span></div>
    <div class="meta">
      <span>赠送 <span class="val" id="balGranted">0.00</span></span>
      <span>充值 <span class="val" id="balTopped">0.00</span></span>
      <span>币种 <span class="val" id="balCurrency">CNY</span></span>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stat-grid">
    <div class="stat-card c1">
      <div class="l">今日消耗</div>
      <div class="v" id="todayCost">¥0.00</div>
      <div class="s" id="todaySnapshot">--</div>
    </div>
    <div class="stat-card c2">
      <div class="l">累计消耗</div>
      <div class="v" id="totalCost">¥0.00</div>
      <div class="s" id="totalSnapshot">自跟踪以来</div>
    </div>
    <div class="stat-card c3">
      <div class="l">快照数</div>
      <div class="v" id="snapshotCount">0</div>
      <div class="s" id="trackDuration">刚刚开始</div>
    </div>
  </div>

  <!-- 余额变化趋势 -->
  <div class="section-title">📊 余额变化 · 每10分钟</div>
  <div class="chart-card" id="chartArea">
    <div class="empty">采集数据中...</div>
  </div>

  <!-- 详细信息 -->
  <div class="section-title">📋 账户信息</div>
  <div class="info-grid" id="infoGrid">
    <div class="info-item"><div class="il">模型</div><div class="iv">deepseek-v4-flash</div></div>
    <div class="info-item"><div class="il">余额状态</div><div class="iv" id="balStatusInfo">—</div></div>
    <div class="info-item"><div class="il">数据源</div><div class="iv">API 实时</div></div>
    <div class="info-item"><div class="il">刷新间隔</div><div class="iv">30 秒</div></div>
  </div>

  <!-- 历史记录 -->
  <div class="section-title">📜 余额快照</div>
  <div class="history-card" id="historyArea">
    <div class="empty">暂无记录</div>
  </div>

  <div class="footer"><span class="dot">●</span> <span id="footerTime">—</span> · 每30秒自动刷新</div>
</div>

<script>
// ====== DeepSeek API Key ======
const DEEPSEEK_API_KEY = *** => {
  let k = localStorage.getItem('ds_api_key');
  if (!k) { k = 'sk-' + '9e4d05ee82f34cd0a8240eeffee998a9'; localStorage.setItem('ds_api_key', k); }
  return k;
})();

// ====== 数据存储 ======
let balanceHistory = []; // [{t: ISO时间, b: 余额}]
try {
  const saved = localStorage.getItem('ds_balance_history');
  if (saved) balanceHistory = JSON.parse(saved);
} catch(e) {}

function saveHistory() {
  try { localStorage.setItem('ds_balance_history', JSON.stringify(balanceHistory)); } catch(e) {}
}

// ====== API ======
async function fetchBalance() {
  const res = await fetch('https://api.deepseek.com/user/balance', {
    headers: { 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY, 'Accept': 'application/json' }
  });
  if (!res.ok) { if (res.status === 401) throw new Error('API Key 无效'); throw new Error('HTTP ' + res.status); }
  return await res.json();
}

// ====== 更新时间 ======
function updateFooter() {
  document.getElementById('footerTime').textContent =
    new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
}

// ====== 对齐到整10分钟 ======
function alignSlot(ts) {
  return Math.floor(ts / 600000) * 600000;
}

// ====== 渲染图表 ======
function renderChart(history, currentBalance) {
  const el = document.getElementById('chartArea');
  if (history.length < 2) {
    el.innerHTML = '<div class="empty">采集数据中，请等待10分钟...</div>';
    return;
  }

  // 按10分钟对齐
  const aligned = {};
  for (const h of history) {
    const t = new Date(h.t).getTime();
    const slot = alignSlot(t);
    if (!aligned[slot] || t > new Date(aligned[slot].t).getTime()) {
      aligned[slot] = { t: slot, b: h.b };
    }
  }

  // 加入当前余额
  const now = Date.now();
  aligned[alignSlot(now)] = { t: alignSlot(now), b: currentBalance };

  const slots = Object.values(aligned).sort((a, b) => a.t - b.t);
  if (slots.length < 2) { el.innerHTML = '<div class="empty">数据不足</div>'; return; }

  let maxDrop = 0.01;
  let rows = [];
  for (let i = 1; i < slots.length; i++) {
    const prev = slots[i-1], curr = slots[i];
    const drop = Math.max(0, prev.b - curr.b);
    if (drop > 0.001) {
      if (drop > maxDrop) maxDrop = drop;
      const t = new Date(curr.t);
      rows.push({
        time: t.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Shanghai' }),
        balance: curr.b,
        drop: drop
      });
    }
  }

  let html = '';

  // 表头：起始时刻
  const firstT = new Date(slots[0].t);
  html += '<div class="bar-row row-first">' +
    '<div class="b-bal">¥' + slots[0].b.toFixed(2) + '</div>' +
    '<div class="b-time">' + firstT.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Shanghai' }) + '</div>' +
    '<div class="b-track"></div>' +
    '<div class="b-drop">—</div></div>';

  // 消耗行
  for (const r of rows) {
    const pct = Math.max(3, (r.drop / maxDrop) * 100);
    const color = r.drop > 0.15 ? '#f59e0b' : r.drop > 0.05 ? '#eab308' : '#4ade80';
    html += '<div class="bar-row">' +
      '<div class="b-bal" style="color:' + color + '">¥' + r.balance.toFixed(2) + '</div>' +
      '<div class="b-time">' + r.time + '</div>' +
      '<div class="b-track"><div class="b-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<div class="b-drop" style="color:' + color + '">¥' + r.drop.toFixed(2) + '</div></div>';
  }

  if (!rows.length) html += '<div class="empty">暂无消耗记录</div>';
  el.innerHTML = html;
}

// ====== 渲染历史记录表 ======
function renderHistory(history) {
  const el = document.getElementById('historyArea');
  if (history.length < 2) { el.innerHTML = '<div class="empty">暂无记录</div>'; return; }

  // 倒序显示（最新的在最上面）
  const reversed = [...history].reverse().slice(0, 30);
  let html = '';
  for (let i = 0; i < reversed.length; i++) {
    const h = reversed[i];
    const t = new Date(h.t);
    const timeStr = t.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Shanghai' });
    const prev = i < reversed.length - 1 ? reversed[i+1] : (history[history.length - 1] || h);
    const drop = Math.max(0, prev.b - h.b);
    html += '<div class="history-row">' +
      '<span class="h-time">' + timeStr + '</span>' +
      '<span class="h-bal">¥' + h.b.toFixed(2) + '</span>' +
      '<span class="h-drop">' + (drop > 0.001 ? '-¥' + drop.toFixed(2) : '—') + '</span></div>';
  }
  el.innerHTML = html;
}

// ====== 主渲染 ======
function renderAll(data, isLive) {
  const info = data.balance_infos?.[0];
  if (!info) return;

  const bal = parseFloat(info.total_balance || '0');
  const granted = parseFloat(info.granted_balance || '0');
  const topped = parseFloat(info.topped_up_balance || '0');
  const avail = data.is_available;
  const cur = info.currency || 'CNY';
  const sym = cur === 'USD' ? '$' : '¥';

  // 记录快照
  const last = balanceHistory[balanceHistory.length - 1];
  if (!last || Math.abs(last.b - bal) > 0.001 || Date.now() - new Date(last.t).getTime() > 120000) {
    balanceHistory.push({ t: new Date().toISOString(), b: bal });
    if (balanceHistory.length > 500) balanceHistory = balanceHistory.slice(-500);
    saveHistory();
  }

  // Header
  document.getElementById('headerSub').textContent =
    (isLive ? '🔴 实时' : '⚫ 缓存') + ' · ' + balanceHistory.length + ' 条快照';
  const badge = document.getElementById('statusBadge');
  badge.textContent = avail ? (isLive ? '● 在线' : '● 缓存') : '✕ 已停用';
  badge.className = 'status ' + (avail ? 'online' : 'offline');

  // Balance
  document.getElementById('balAmount').textContent = bal.toFixed(2);
  document.getElementById('balGranted').textContent = sym + granted.toFixed(2);
  document.getElementById('balTopped').textContent = sym + topped.toFixed(2);
  document.getElementById('balCurrency').textContent = cur;

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todaySamples = balanceHistory.filter(h => new Date(h.t).getTime() >= todayStart.getTime());
  const todayCost = todaySamples.length >= 2 ? Math.max(0, todaySamples[0].b - bal) : 0;
  const totalCost = balanceHistory.length >= 2 ? Math.max(0, balanceHistory[0].b - bal) : 0;

  document.getElementById('todayCost').textContent = sym + todayCost.toFixed(2);
  document.getElementById('todaySnapshot').textContent = todaySamples.length + ' 条';
  document.getElementById('totalCost').textContent = sym + totalCost.toFixed(2);
  document.getElementById('snapshotCount').textContent = balanceHistory.length;

  // 跟踪时长
  if (balanceHistory.length >= 2) {
    const first = new Date(balanceHistory[0].t);
    const hours = Math.round((Date.now() - first.getTime()) / 3600000 * 10) / 10;
    document.getElementById('trackDuration').textContent = hours + ' 小时';
  }

  // 余额状态
  document.getElementById('balStatusInfo').textContent = avail ? '正常' : '已停用';
  document.getElementById('balStatusInfo').style.color = avail ? '#4ade80' : '#ef4444';

  // 图表
  renderChart(balanceHistory, bal);

  // 历史
  renderHistory(balanceHistory);
}

// ====== 主循环 ======
async function tick() {
  updateFooter();
  try {
    const data = await fetchBalance();
    renderAll(data, true);
  } catch(err) {
    console.error(err);
    if (balanceHistory.length > 0) {
      const lastBal = balanceHistory[balanceHistory.length - 1].b;
      renderAll({
        is_available: true,
        balance_infos: [{ total_balance: lastBal.toString(), granted_balance: '0', topped_up_balance: '0', currency: 'CNY' }]
      }, false);
    }
  }
}

tick();
setInterval(tick, 30000);
</script>
</body>
</html>
