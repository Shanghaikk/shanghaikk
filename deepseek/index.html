<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 DeepSeek 用量看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;padding:24px}
.container{max-width:640px;margin:0 auto}

/* Header */
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;font-weight:700;color:#1d1d1f}
.header .sub{font-size:12px;color:#86868b;margin-top:4px}
.header .status{display:inline-block;font-size:10px;padding:3px 12px;border-radius:20px;margin-top:6px}
.status.online{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.status.offline{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}

/* Balance Section */
.balance-section{background:#ffffff;border:1px solid #e5e5ea;border-radius:16px;padding:24px;margin-bottom:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.balance-section .label{font-size:11px;color:#86868b;text-transform:uppercase;letter-spacing:1px}
.balance-section .amount{font-size:44px;font-weight:700;color:#1d1d1f;margin:4px 0 2px;letter-spacing:-2px}
.balance-section .amount .cur{font-size:28px;font-weight:400;color:#86868b}
.balance-section .meta{display:flex;justify-content:center;gap:24px;margin-top:8px;font-size:11px;color:#86868b}
.balance-section .meta span{display:flex;align-items:center;gap:4px}
.balance-section .meta .val{color:#1d1d1f;font-weight:500}

/* Stat Grid */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:#ffffff;border:1px solid #e5e5ea;border-radius:12px;padding:16px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card .l{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:.5px}
.stat-card .v{font-size:20px;font-weight:700;margin-top:4px}
.stat-card .s{font-size:10px;color:#aeaeb2;margin-top:2px}
.stat-card.c1 .v{color:#e67e22}
.stat-card.c2 .v{color:#2980b9}
.stat-card.c3 .v{color:#8e44ad}

/* Chart Section */
.section-title{font-size:13px;font-weight:600;color:#86868b;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.chart-card{background:#ffffff;border:1px solid #e5e5ea;border-radius:12px;padding:16px;margin-bottom:12px;min-height:120px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-header .tl{font-size:11px;color:#86868b;font-weight:500}
.chart-header .tl .hl{color:#1d1d1f}
.chart-header .badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#f5f5f7;color:#86868b;border:1px solid #e5e5ea}

/* Bar Chart */
.bar-list{display:flex;flex-direction:column}
.bar-row{display:flex;align-items:center;gap:6px;padding:4px 0;min-height:30px}
.bar-row .b-bal{font-size:12px;font-weight:600;min-width:56px;text-align:right}
.bar-row .b-time{font-size:11px;color:#aeaeb2;min-width:42px;text-align:center;font-weight:500}
.bar-row .b-track{flex:1;height:18px;background:#f2f2f7;border-radius:4px;overflow:hidden;min-width:60px}
.bar-row .b-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-row .b-drop{font-size:12px;font-weight:600;min-width:50px;text-align:right}
.bar-row.row-first .b-bal,.bar-row.row-first .b-time{color:#aeaeb2}
.bar-row.row-first .b-drop{color:#c7c7cc}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.info-item{background:#ffffff;border:1px solid #e5e5ea;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.info-item .il{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:.5px}
.info-item .iv{font-size:14px;font-weight:600;margin-top:3px}

/* History Table */
.history-card{background:#ffffff;border:1px solid #e5e5ea;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.history-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f2f2f7;font-size:12px}
.history-row:last-child{border-bottom:none}
.history-row .h-time{color:#aeaeb2}
.history-row .h-bal{font-weight:600;color:#1d1d1f}
.history-row .h-drop{color:#e67e22}

/* Footer */
.footer{text-align:center;padding:12px 0;font-size:10px;color:#aeaeb2}
.footer .dot{color:#34c759}

/* Empty */
.empty{text-align:center;padding:30px;color:#aeaeb2;font-size:13px}

@media(max-width:480px){
  .stat-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-card{padding:10px}
  .balance-section .amount{font-size:36px}
  .balance-section .amount .cur{font-size:22px}
  body{padding:16px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦐 DeepSeek 用量</h1>
    <div class="sub" id="headerSub">加载中...</div>
    <div class="status" id="statusBadge">● 连接中</div>
  </div>

  <!-- 余额 -->
  <div class="balance-section">
    <div class="label">💰 账户余额</div>
    <div class="amount"><span class="cur">¥</span><span id="balAmount">0.00</span></div>
    <div class="meta">
      <span>赠送 <span class="val" id="balGranted">0.00</span></span>
      <span>充值 <span class="val" id="balTopped">0.00</span></span>
      <span>币种 <span class="val" id="balCurrency">CNY</span></span>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stat-grid">
    <div class="stat-card c1">
      <div class="l">今日消耗</div>
      <div class="v" id="todayCost">¥0.00</div>
      <div class="s" id="todaySnapshot">--</div>
    </div>
    <div class="stat-card c2">
      <div class="l">累计消耗</div>
      <div class="v" id="totalCost">¥0.00</div>
      <div class="s" id="totalSnapshot">自跟踪以来</div>
    </div>
    <div class="stat-card c3">
      <div class="l">快照数</div>
      <div class="v" id="snapshotCount">0</div>
      <div class="s" id="trackDuration">刚刚开始</div>
    </div>
  </div>

  <!-- 用量三板块（仿 DeepSeek 开放平台） -->
  <div class="section-title" style="margin-top:24px">🔋 今日用量</div>
  <div class="stat-grid" id="usageStats">
    <div class="stat-card c1">
      <div class="l">💰 消费金额</div>
      <div class="v" id="usageCost">¥0.00</div>
      <div class="s" id="usageCostLabel">今日消耗</div>
    </div>
    <div class="stat-card c2">
      <div class="l">📡 API 请求</div>
      <div class="v" id="usageCalls">0</div>
      <div class="s" id="usageCallsLabel">次请求</div>
    </div>
    <div class="stat-card c3">
      <div class="l">🔤 Tokens</div>
      <div class="v" id="usageTokens">0</div>
      <div class="s" id="usageTokensLabel">input / output</div>
    </div>
  </div>

  <!-- 余额变化趋势 -->
  <div class="section-title">📊 余额变化 · 每10分钟</div>
  <div class="chart-card" id="chartArea">
    <div class="empty">采集数据中...</div>
  </div>

  <!-- 详细信息 -->
  <div class="section-title">📋 账户信息</div>
  <div class="info-grid" id="infoGrid">
    <div class="info-item"><div class="il">模型</div><div class="iv">deepseek-v4-flash</div></div>
    <div class="info-item"><div class="il">余额状态</div><div class="iv" id="balStatusInfo">—</div></div>
    <div class="info-item"><div class="il">数据源</div><div class="iv">API 实时</div></div>
    <div class="info-item"><div class="il">刷新间隔</div><div class="iv">30 秒</div></div>
  </div>

  <!-- 历史记录 -->
  <div class="section-title">📜 余额快照</div>
  <div class="history-card" id="historyArea">
    <div class="empty">暂无记录</div>
  </div>

  <div class="footer"><span class="dot">●</span> <span id="footerTime">—</span> · 每30秒自动刷新</div>
</div>

<script>
// ====== DeepSeek API Key ======
const DEEPSEEK_API_KEY = (function() {
  let k = localStorage.getItem('ds_api_key');
  if (!k) { k = 'sk-' + '9e4d05ee82f34cd0a8240eeffee998a9'; localStorage.setItem('ds_api_key', k); }
  return k;
})();

// ====== 数据存储 ======
let balanceHistory = [];
const MAX_HISTORY = 50000; // 约 347 天 × 144 条/天
try {
  const saved = localStorage.getItem('ds_balance_history');
  if (saved) balanceHistory = JSON.parse(saved);
} catch(e) {}

function saveHistory() {
  try { localStorage.setItem('ds_balance_history', JSON.stringify(balanceHistory)); } catch(e) {}
}

// ====== 加载服务器端全量历史 ======
let serverLoaded = 0;
let serverError = null;
const SERVER_DATA_URL = 'https://raw.githubusercontent.com/Shanghaikk/shanghaikk/main/deepseek/balance-data.json';
const USAGE_DATA_URL = 'https://raw.githubusercontent.com/Shanghaikk/shanghaikk/main/deepseek/usage-data.json';

async function loadServerHistory() {
  try {
    // 尝试从 GitHub Pages 加载（同域）
    let res = await fetch('balance-data.json?t=' + Date.now());
    if (!res.ok) {
      // 降级到 raw 地址
      res = await fetch(SERVER_DATA_URL + '?t=' + Date.now());
    }
    if (!res.ok) { throw new Error('HTTP ' + res.status); }
    const data = await res.json();
    if (!Array.isArray(data)) { throw new Error('not array'); }
    serverLoaded = data.length;
    console.log('[DS] server loaded', serverLoaded, 'records');
    return data;
  } catch(e) {
    serverError = e.message;
    console.warn('[DS] server failed:', e.message);
    return null;
  }
}

// ====== API ======
async function fetchBalance() {
  const res = await fetch('https://api.deepseek.com/user/balance', {
    headers: { 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY, 'Accept': 'application/json' }
  });
  if (!res.ok) { if (res.status === 401) throw new Error('API Key 无效'); throw new Error('HTTP ' + res.status); }
  return await res.json();
}

// ====== 更新时间 ======
function updateFooter() {
  document.getElementById('footerTime').textContent =
    new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
}

// ====== 对齐到整10分钟 ======
function alignSlot(ts) {
  return Math.floor(ts / 600000) * 600000;
}

// ====== 渲染余额变化（完全照搬 Excel 数据，不重新计算） ======
function renderChart(history) {
  const el = document.getElementById('chartArea');
  if (history.length < 2) {
    el.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }

  // 直接使用 JSON 中的 t(时间)/b(余额)/d(变化)，和数据源完全一致
  let html = '<div class="chart-header"><div class="tl">时间</div><div class="tl" style="text-align:center">余额</div><div class="tl" style="text-align:right">变化</div></div>';

  let maxDrop = 0.01;
  const drops = [];
  for (const h of history) {
    const d = typeof h.d === 'number' ? h.d : 0;
    if (d < 0 && Math.abs(d) > maxDrop) maxDrop = Math.abs(d);
    drops.push(d);
  }

  for (let i = 0; i < history.length; i++) {
    const h = history[i];
    const d = typeof h.d === 'number' ? h.d : 0;
    const time = h.t.slice(11, 16); // "HH:MM"
    const isFirst = i === 0;
    const color = d < 0 ? (Math.abs(d) > 0.15 ? '#e67e22' : Math.abs(d) > 0.05 ? '#f1c40f' : '#27ae60') : '#27ae60';
    const barPct = !isFirst && d < 0 ? Math.max(3, (Math.abs(d) / maxDrop) * 100) : 0;

    html += '<div class="bar-row">' +
      '<div class="b-time" style="min-width:48px">' + time + '</div>' +
      '<div class="b-bal" style="color:' + (isFirst ? '#aeaeb2' : color) + ';min-width:60px;text-align:center">¥' + h.b.toFixed(2) + '</div>' +
      '<div class="b-track">' + (barPct > 0 ? '<div class="b-fill" style="width:' + barPct + '%;background:' + color + '"></div>' : '') + '</div>' +
      '<div class="b-drop" style="color:' + color + ';min-width:60px;text-align:right">' + (isFirst ? '—' : (d >= 0 ? '+0.00' : d.toFixed(2))) + '</div></div>';
  }

  el.innerHTML = html;
}

// ====== 渲染历史记录表（照搬 Excel 数据） ======
function renderHistory(history) {
  const el = document.getElementById('historyArea');
  if (history.length < 2) { el.innerHTML = '<div class="empty">暂无记录</div>'; return; }

  const reversed = [...history].reverse().slice(0, 30);
  let html = '';
  for (const h of reversed) {
    const d = typeof h.d === 'number' ? h.d : null;
    html += '<div class="history-row">' +
      '<span class="h-time">' + (h.t.slice(5, 16)) + '</span>' +
      '<span class="h-bal">¥' + h.b.toFixed(2) + '</span>' +
      '<span class="h-drop">' + (d !== null ? (d >= 0 ? '+0.00' : d.toFixed(2)) : '—') + '</span></div>';
  }
  el.innerHTML = html;
}

// ====== 主渲染 ======
function renderAll(data, isLive) {
  const info = data.balance_infos?.[0];
  if (!info) return;

  const bal = parseFloat(info.total_balance || '0');
  const granted = parseFloat(info.granted_balance || '0');
  const topped = parseFloat(info.topped_up_balance || '0');
  const avail = data.is_available;
  const cur = info.currency || 'CNY';
  const sym = cur === 'USD' ? '$' : '¥';

  const last = balanceHistory[balanceHistory.length - 1];
  if (!last || Math.abs(last.b - bal) > 0.001 || Date.now() - new Date(last.t).getTime() > 120000) {
    balanceHistory.push({ t: new Date().toISOString(), b: bal });
    if (balanceHistory.length > MAX_HISTORY) balanceHistory = balanceHistory.slice(-MAX_HISTORY);
    saveHistory();
  }

  document.getElementById('headerSub').textContent =
    (isLive ? '🔴 实时' : '⚫ 缓存') + ' · ' + balanceHistory.length + ' 条快照';
  const badge = document.getElementById('statusBadge');
  badge.textContent = avail ? (isLive ? '● 在线' : '● 缓存') : '✕ 已停用';
  badge.className = 'status ' + (avail ? 'online' : 'offline');

  document.getElementById('balAmount').textContent = bal.toFixed(2);
  document.getElementById('balGranted').textContent = sym + granted.toFixed(2);
  document.getElementById('balTopped').textContent = sym + topped.toFixed(2);
  document.getElementById('balCurrency').textContent = cur;

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todaySamples = balanceHistory.filter(h => new Date(h.t).getTime() >= todayStart.getTime());
  const todayCost = todaySamples.length >= 2 ? Math.max(0, todaySamples[0].b - bal) : 0;
  const totalCost = balanceHistory.length >= 2 ? Math.max(0, balanceHistory[0].b - bal) : 0;

  document.getElementById('todayCost').textContent = sym + todayCost.toFixed(2);
  document.getElementById('todaySnapshot').textContent = todaySamples.length + ' 条';
  document.getElementById('totalCost').textContent = sym + totalCost.toFixed(2);
  document.getElementById('snapshotCount').textContent = balanceHistory.length;

  if (balanceHistory.length >= 2) {
    const first = new Date(balanceHistory[0].t);
    const hours = Math.round((Date.now() - first.getTime()) / 3600000 * 10) / 10;
    document.getElementById('trackDuration').textContent = hours + ' 小时';
  }

  document.getElementById('balStatusInfo').textContent = avail ? '正常' : '已停用';
  document.getElementById('balStatusInfo').style.color = avail ? '#27ae60' : '#e74c3c';

  renderChart(balanceHistory);
  renderHistory(balanceHistory);
}

// ====== 主循环 ======
async function tick() {
  updateFooter();
  try {
    const data = await fetchBalance();
    renderAll(data, true);
  } catch(err) {
    console.error(err);
    if (balanceHistory.length > 0) {
      const lastBal = balanceHistory[balanceHistory.length - 1].b;
      renderAll({
        is_available: true,
        balance_infos: [{ total_balance: lastBal.toString(), granted_balance: '0', topped_up_balance: '0', currency: 'CNY' }]
      }, false);
    }
  }
}

// ====== 加载用量数据 ======
function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

async function loadUsageStats() {
  try {
    let res = await fetch('usage-data.json?t=' + Date.now());
    if (!res.ok) { res = await fetch(USAGE_DATA_URL + '?t=' + Date.now()); }
    if (!res.ok) return;
    const data = await res.json();
    const today = new Date().toISOString().slice(0, 10);
    let todayData = data.days?.[today];
    if (!todayData) {
      const days = Object.keys(data.days || {}).sort().reverse();
      if (days.length > 0) todayData = data.days[days[0]];
    }
    if (!todayData) return;
    document.getElementById('usageCost').textContent = '¥' + todayData.cost_cny.toFixed(2);
    document.getElementById('usageCalls').textContent = formatNum(todayData.calls);
    document.getElementById('usageCallsLabel').textContent = todayData.calls + ' 次请求';
    const tf = formatNum(todayData.input + todayData.output);
    document.getElementById('usageTokens').textContent = tf;
    document.getElementById('usageTokensLabel').textContent = formatNum(todayData.input) + ' / ' + formatNum(todayData.output);
  } catch(e) { console.warn('[USAGE]', e.message); }
}

// ====== 启动：加载服务器历史 + 实时更新 ======
(async function init() {
  // 1. 显示加载状态
  document.getElementById('headerSub').textContent = '⏳ 加载服务器历史...';

  // 2. 先从服务器拉取全量历史（跨设备共享）
  const serverData = await loadServerHistory();
  if (serverData && serverData.length > 0) {
    // 3. 合并去重：补充本地没有的记录
    const localKeys = new Set(balanceHistory.map(h => h.t.slice(0, 16)));
    let added = 0;
    for (const h of serverData) {
      if (typeof h.b === 'number' && !localKeys.has(h.t.slice(0, 16))) {
        balanceHistory.push(h);
        added++;
      }
    }
    if (added > 0) {
      balanceHistory.sort((a, b) => new Date(a.t) - new Date(b.t));
      if (balanceHistory.length > MAX_HISTORY) balanceHistory = balanceHistory.slice(-MAX_HISTORY);
      saveHistory();
    }
  }

  // 4. 更新状态显示
  const statusParts = [];
  if (serverData) statusParts.push('☁️ ' + serverData.length + ' 服务器条');
  if (balanceHistory.length > serverData.length) statusParts.push('💻 ' + (balanceHistory.length - serverData.length) + ' 本地条');
  if (serverError) statusParts.push('⚠️ ' + serverError.slice(0, 30));
  document.getElementById('headerSub').textContent = statusParts.join(' · ') || '加载中...';

  // 5. 加载今日用量（消费/请求/tokens）
  loadUsageStats();

  // 6. 开始实时更新
  tick();
  setInterval(tick, 30000);
})();
</script>
</body>
</html>
