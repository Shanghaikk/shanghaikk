<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 虾虾 · DeepSeek 费用看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#0a0a0f;color:#e0e0e8;min-height:100vh;padding:16px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:20px;font-weight:600;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .meta{font-size:12px;color:#555;margin-top:4px}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.hero-card{border-radius:16px;padding:16px 18px}
.hero-card .hl{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;opacity:.7}
.hero-card .hv{font-size:26px;font-weight:700}
.hero-card .hs{font-size:11px;margin-top:3px;opacity:.5}
.hero-balance{background:linear-gradient(135deg,#0a2a1a,#1a1a24);border:1px solid rgba(74,222,128,.25)}
.hero-balance .hl,.hero-balance .hv{color:#4ade80}
.hero-todaycost{background:linear-gradient(135deg,#1a1a24,#2a1a0a);border:1px solid rgba(245,158,11,.25)}
.hero-todaycost .hl,.hero-todaycost .hv{color:#f59e0b}
.hero-hours{background:linear-gradient(135deg,#1a1a24,#0a1a2a);border:1px solid rgba(96,165,250,.25)}
.hero-hours .hl,.hero-hours .hv{color:#60a5fa}
.hero-total{background:linear-gradient(135deg,#1a1a24,#1a0a2a);border:1px solid rgba(167,139,250,.25)}
.hero-total .hl,.hero-total .hv{color:#a78bfa}
.section-title{font-size:13px;font-weight:600;color:#666;margin:16px 0 10px;border-bottom:1px solid #1a1a24}
.chart-area{background:#1a1a24;border-radius:12px;padding:16px;border:1px solid #2a2a38;margin-bottom:16px}
.bar-row{display:flex;align-items:center;margin:5px 0;min-height:34px;gap:6px}
.bar-bal{font-size:14px;font-weight:700;min-width:62px;text-align:right}
.bar-time{font-size:12px;color:#888;min-width:46px;text-align:center;font-weight:500}
.bar-track-wrap{flex:1;height:22px;background:#22222e;border-radius:5px;overflow:hidden;min-width:80px}
.bar-fill{height:100%;border-radius:5px}
.bar-drop{font-size:13px;font-weight:600;min-width:54px;text-align:right}
.bar-row-0 .bar-bal,.bar-row-0 .bar-drop{color:#555}
.bar-row-0 .bar-time{color:#555;font-weight:400}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.info-card{background:#1a1a24;border-radius:10px;padding:10px 12px;border:1px solid #2a2a38}
.info-card .il{font-size:10px;color:#666;text-transform:uppercase}
.info-card .iv{font-size:14px;font-weight:600;margin-top:2px}
.footer{text-align:center;margin-top:16px;padding:12px 0;font-size:11px;color:#333;border-top:1px solid #1a1a24}
.footer .live{color:#4ade80}
@media(max-width:480px){.hero{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦐 虾虾 · DeepSeek 费用看板</h1>
    <div class="meta" id="metaInfo">加载中...</div>
  </div>
  <div class="hero">
    <div class="hero-card hero-balance">
      <div class="hl">💰 实时余额</div>
      <div class="hv" id="balDisplay">—</div>
      <div class="hs" id="balUpdate">查询中...</div>
    </div>
    <div class="hero-card hero-todaycost">
      <div class="hl">📉 今日消耗</div>
      <div class="hv" id="costDisplay">—</div>
      <div class="hs" id="costSub"></div>
    </div>
    <div class="hero-card hero-hours">
      <div class="hl">⏱ 已活跃</div>
      <div class="hv" id="hoursDisplay">—</div>
      <div class="hs" id="hoursSub"></div>
    </div>
    <div class="hero-card hero-total">
      <div class="hl">📊 累计消费</div>
      <div class="hv" id="totalDisplay">—</div>
      <div class="hs" id="totalSub">自本页面启动以来</div>
    </div>
  </div>
  <div class="section-title">📊 余额变化 · 每10分钟</div>
  <div class="chart-area" id="chartArea"><div style="color:#444;padding:30px;text-align:center">等待数据...</div></div>
  <div class="section-title">📋 DeepSeek 账户信息</div>
  <div class="info-grid" id="infoGrid"></div>
  <div class="footer">🕐 <span id="footerTime">—</span> · <span class="live">●</span> 每30秒自动刷新</div>
</div>

<script>
// DeepSeek API Key - 从 DeepSeek 开放平台获取: https://platform.deepseek.com/api_keys
// 从localStorage读取Key（首次访问自动保存内置Key）
const DEEPSEEK_API_KEY = (() => {
  let k = localStorage.getItem('ds_api_key');
  if (!k) {   k = 'sk-' + '9e4d05ee82f34cd0a8240eeffee998a9'; localStorage.setItem('ds_api_key', k); }
  return k;
})();

// ====== 数据存储 ======
// 余额快照历史: [{t: ISO时间, b: 余额}]
let balanceHistory = [];

// 从 localStorage 恢复历史
try {
  const saved = localStorage.getItem('ds_balance_history');
  if (saved) balanceHistory = JSON.parse(saved);
} catch(e) {}

// 保存到 localStorage
function saveHistory() {
  try {
    localStorage.setItem('ds_balance_history', JSON.stringify(balanceHistory));
  } catch(e) {}
}

// ====== DeepSeek API ======
const API_BASE = 'https://api.deepseek.com';

/**
 * 查询账户余额
 * 与 DeepSeek 开放平台显示的余额完全一致
 * API: GET https://api.deepseek.com/user/balance
 * 返回: { is_available, balance_infos: [{ total_balance, granted_balance, topped_up_currency }] }
 */
async function fetchBalance() {
  const res = await fetch(`${API_BASE}/user/balance`, {
    headers: {
      'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
      'Accept': 'application/json'
    }
  });
  if (!res.ok) {
    if (res.status === 401) throw new Error('API Key 无效');
    if (res.status === 429) throw new Error('请求太频繁');
    throw new Error(`HTTP ${res.status}`);
  }
  return await res.json();
}

// ====== 渲染 ======
function render(data, isLive) {
  const info = data.balance_infos?.[0];
  if (!info) return;

  const now = Date.now();
  const totalBalance = parseFloat(info.total_balance || '0');
  const grantedBalance = parseFloat(info.granted_balance || '0');
  const toppedUpBalance = parseFloat(info.topped_up_balance || '0');
  const currency = info.currency || 'CNY';
  const isAvailable = data.is_available;
  const currencySymbol = currency === 'USD' ? '$' : '¥';

  // 记录快照（仅当余额变化或超过2分钟时）
  const last = balanceHistory[balanceHistory.length - 1];
  if (!last || Math.abs(last.b - totalBalance) > 0.001 || (now - new Date(last.t).getTime()) > 120000) {
    balanceHistory.push({ t: new Date().toISOString(), b: totalBalance });
    // 最多保留 500 条
    if (balanceHistory.length > 500) balanceHistory = balanceHistory.slice(-500);
    saveHistory();
  }

  // --- 顶部四个卡片 ---

  // 1. 实时余额
  document.getElementById('balDisplay').textContent = currencySymbol + totalBalance.toFixed(2);
  document.getElementById('balUpdate').textContent = isLive ? '🔴 实时' : '⚫ 缓存';

  // 2. 今日消耗（基于余额变化计算）
  // 用今天的第一个快照和最后一个快照之差
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);
  const todaySamples = balanceHistory.filter(h => new Date(h.t).getTime() >= todayStart.getTime());
  let todayCost = 0;
  if (todaySamples.length >= 2) {
    const firstToday = todaySamples[0].b;
    const lastToday = todaySamples[todaySamples.length - 1].b;
    todayCost = Math.max(0, firstToday - lastToday);
  }
  // 也要算上当前余额和最近快照的差值（如果有不包含在历史里的消耗）
  if (todaySamples.length > 0) {
    const latestHist = todaySamples[todaySamples.length - 1].b;
    todayCost = Math.max(todayCost, latestHist - totalBalance);
  }
  document.getElementById('costDisplay').textContent = currencySymbol + todayCost.toFixed(2);
  const activePeriods = todaySamples.filter(s => {
    const idx = balanceHistory.indexOf(s);
    if (idx > 0) {
      const prev = balanceHistory[idx - 1];
      return prev.b - s.b > 0.001;
    }
    return false;
  }).length;
  document.getElementById('costSub').textContent = activePeriods + ' 次余额变动';

  // 3. 活跃时间
  const activeMins = activePeriods * 10; // 每次快照间隔10分钟算活跃
  document.getElementById('hoursDisplay').textContent = activeMins + '分钟';
  document.getElementById('hoursSub').textContent = activePeriods + ' 个活跃时段';

  // 4. 累计消费
  const firstBalance = balanceHistory.length > 0 ? balanceHistory[0].b : totalBalance;
  const totalCost = Math.max(0, firstBalance - totalBalance);
  document.getElementById('totalDisplay').textContent = currencySymbol + totalCost.toFixed(2);

  // 元信息
  document.getElementById('metaInfo').textContent =
    (isLive ? '🔴 实时连接' : '⚫ 缓存') + ' · ' + balanceHistory.length + ' 条快照' +
    ' · ' + (isAvailable ? '账户正常' : '⚠️ 已停用');

  // --- 余额变化图 ---
  renderChart(balanceHistory, totalBalance, currencySymbol);

  // --- 信息详情 ---
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card">
      <div class="il">模型</div>
      <div class="iv">deepseek-v4-flash</div>
    </div>
    <div class="info-card">
      <div class="il">快照数</div>
      <div class="iv">${balanceHistory.length}</div>
    </div>
    <div class="info-card">
      <div class="il">账户状态</div>
      <div class="iv" style="color:${isAvailable ? '#4ade80' : '#ef4444'}">${isAvailable ? '正常' : '已停用'}</div>
    </div>
    <div class="info-card">
      <div class="il">币种</div>
      <div class="iv">${currency} (${currencySymbol})</div>
    </div>
    <div class="info-card">
      <div class="il">赠送余额</div>
      <div class="iv" style="color:#4ade80">${currencySymbol}${grantedBalance.toFixed(2)}</div>
    </div>
    <div class="info-card">
      <div class="il">充值余额</div>
      <div class="iv" style="color:#f59e0b">${currencySymbol}${toppedUpBalance.toFixed(2)}</div>
    </div>
  `;
}

function renderChart(history, currentBalance, symbol) {
  // 每10分钟记录一次余额，按时间对齐到整10分钟
  // 格式：{ timeStr: '10:00', balance: 9.37, drop: 0.25 }
  const INTERVAL = 10 * 60 * 1000; // 10分钟

  // 1. 把历史快照按每10分钟整点对齐
  //    取每个快照时间，对齐到最近的整10分钟
  function alignTo10min(ts) {
    return Math.floor(ts / INTERVAL) * INTERVAL;
  }

  // 2. 整理：对每个10分钟区间，取该区间内的最后一条余额记录
  let snapshots = []; // [{time, balance}]
  
  // 先把所有快照按10分钟对齐
  const aligned = {};
  for (const h of history) {
    const t = new Date(h.t).getTime();
    const slot = alignTo10min(t);
    // 取该区间内最新的余额
    if (!aligned[slot] || t > new Date(aligned[slot].time).getTime()) {
      aligned[slot] = { time: slot, balance: h.b };
    }
  }
  
  // 加入当前余额（对齐到当前10分钟）
  const now = Date.now();
  const nowSlot = alignTo10min(now);
  aligned[nowSlot] = { time: nowSlot, balance: currentBalance };

  // 3. 按时间排序
  const slots = Object.values(aligned).sort((a, b) => a.time - b.time);

  if (slots.length < 2) {
    document.getElementById('chartArea').innerHTML =
      '<div style="color:#444;padding:30px;text-align:center">数据不足，继续采样中...</div>';
    return;
  }

  // 4. 计算每行的差值
  let rows = [];
  let maxDrop = 0.01;
  for (let i = 1; i < slots.length; i++) {
    const prev = slots[i - 1];
    const curr = slots[i];
    const drop = Math.max(0, prev.balance - curr.balance);
    // 差值 = 上一时刻余额 - 这一时刻余额
    if (drop > 0) { // 只显示有消耗的行
      if (drop > maxDrop) maxDrop = drop;
      const timeLabel = new Date(curr.time).toLocaleTimeString('zh-CN', {
        hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Shanghai'
      });
      rows.push({
        time: curr.time,
        timeLabel: timeLabel,
        balance: curr.balance,   // 这一时刻的余额
        drop: drop               // 差值 = 上一时刻 - 这一时刻
      });
    }
  }

  // 5. 渲染
  let html = '';
  
  // 第一行：显示最早的时刻（灰色，无柱状图）
  const firstTime = new Date(slots[0].time).toLocaleTimeString('zh-CN', {
    hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Shanghai'
  });
  html += '<div class="bar-row bar-row-0">' +
    '<div class="bar-bal" style="color:#555">' + symbol + slots[0].balance.toFixed(2) + '</div>' +
    '<div class="bar-time" style="color:#555">' + firstTime + '</div>' +
    '<div class="bar-track-wrap"></div>' +
    '<div class="bar-drop" style="color:#444">—</div></div>';

  // 后续行：有消耗的时段
  for (const row of rows) {
    const widthPct = Math.max(4, (row.drop / maxDrop) * 100);
    const color = row.drop > 0.15 ? '#f59e0b' : row.drop > 0.05 ? '#eab308' : '#4ade80';
    html += '<div class="bar-row">' +
      '<div class="bar-bal" style="color:' + color + '">' + symbol + row.balance.toFixed(2) + '</div>' +
      '<div class="bar-time" style="color:#888">' + row.timeLabel + '</div>' +
      '<div class="bar-track-wrap"><div class="bar-fill" style="width:' + widthPct + '%;background:' + color + '"></div></div>' +
      '<div class="bar-drop" style="color:' + color + '">' + symbol + row.drop.toFixed(2) + '</div></div>';
  }

  if (!html) {
    html = '<div style="color:#444;padding:20px;text-align:center">暂无消耗记录</div>';
  }

  document.getElementById('chartArea').innerHTML = html;
}

// ====== 主循环 ======
async function tick() {
  const now = new Date();
  document.getElementById('footerTime').textContent =
    now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });

  try {
    const data = await fetchBalance();
    render(data, true);
  } catch (err) {
    // 如果 API 失败，尝试用缓存数据渲染
    console.error('获取余额失败:', err.message);
    if (balanceHistory.length > 0) {
      const lastBal = balanceHistory[balanceHistory.length - 1].b;
      render({
        is_available: true,
        balance_infos: [{
          total_balance: lastBal.toString(),
          granted_balance: '0',
          topped_up_balance: '0',
          currency: 'CNY'
        }]
      }, false);
    }
  }
}

// 立即执行一次
tick();

// 每30秒执行一次，永远不停止
setInterval(tick, 30000);
</script>
</body>
</html>
