<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 虾虾 · 费用看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#0a0a0f;color:#e0e0e8;min-height:100vh;padding:16px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:20px;font-weight:600;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .meta{font-size:12px;color:#555;margin-top:4px}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.hero-card{border-radius:16px;padding:16px 18px}
.hero-card .hl{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;opacity:.7}
.hero-card .hv{font-size:26px;font-weight:700}
.hero-card .hs{font-size:11px;margin-top:3px;opacity:.5}
.hero-balance{background:linear-gradient(135deg,#0a2a1a,#1a1a24);border:1px solid rgba(74,222,128,.25)}
.hero-balance .hl,.hero-balance .hv{color:#4ade80}
.hero-todaycost{background:linear-gradient(135deg,#1a1a24,#2a1a0a);border:1px solid rgba(245,158,11,.25)}
.hero-todaycost .hl,.hero-todaycost .hv{color:#f59e0b}
.hero-hours{background:linear-gradient(135deg,#1a1a24,#0a1a2a);border:1px solid rgba(96,165,250,.25)}
.hero-hours .hl,.hero-hours .hv{color:#60a5fa}
.hero-total{background:linear-gradient(135deg,#1a1a24,#1a0a2a);border:1px solid rgba(167,139,250,.25)}
.hero-total .hl,.hero-total .hv{color:#a78bfa}
.section-title{font-size:13px;font-weight:600;color:#666;margin:16px 0 10px;border-bottom:1px solid #1a1a24}
.chart-area{background:#1a1a24;border-radius:12px;padding:16px;border:1px solid #2a2a38;margin-bottom:16px}
.bar-row{display:flex;align-items:center;margin:5px 0;min-height:34px;gap:6px}
.bar-bal{font-size:14px;font-weight:700;min-width:62px;text-align:right}
.bar-time{font-size:12px;color:#888;min-width:46px;text-align:center;font-weight:500}
.bar-track-wrap{flex:1;height:22px;background:#22222e;border-radius:5px;overflow:hidden;min-width:80px}
.bar-fill{height:100%;border-radius:5px}
.bar-drop{font-size:13px;font-weight:600;min-width:54px;text-align:right}
.bar-row-0 .bar-bal,.bar-row-0 .bar-drop{color:#555}
.bar-row-0 .bar-time{color:#555;font-weight:400}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.info-card{background:#1a1a24;border-radius:10px;padding:10px 12px;border:1px solid #2a2a38}
.info-card .il{font-size:10px;color:#666;text-transform:uppercase}
.info-card .iv{font-size:14px;font-weight:600;margin-top:2px}
.footer{text-align:center;margin-top:16px;padding:12px 0;font-size:11px;color:#333;border-top:1px solid #1a1a24}
@media(max-width:480px){.hero{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦐 虾虾 · 费用看板</h1>
    <div class="meta" id="metaInfo">加载中...</div>
  </div>
  <div class="hero">
    <div class="hero-card hero-balance">
      <div class="hl">💰 余额</div>
      <div class="hv" id="balDisplay">—</div>
      <div class="hs" id="balUpdate">查询中...</div>
    </div>
    <div class="hero-card hero-todaycost">
      <div class="hl">📉 今日花费</div>
      <div class="hv" id="costDisplay">—</div>
      <div class="hs" id="costSub"></div>
    </div>
    <div class="hero-card hero-hours">
      <div class="hl">⏱ 今日活跃</div>
      <div class="hv" id="hoursDisplay">—</div>
      <div class="hs" id="hoursSub"></div>
    </div>
    <div class="hero-card hero-total">
      <div class="hl">📊 累计消费</div>
      <div class="hv" id="totalDisplay">—</div>
      <div class="hs">自从跟踪以来</div>
    </div>
  </div>
  <div class="section-title">📊 余额变化（每10分钟）</div>
  <div class="chart-area" id="chartArea"><div style="color:#444;padding:30px;text-align:center">加载中...</div></div>
  <div class="section-title">📋 详情</div>
  <div class="info-grid" id="infoGrid"></div>
  <div class="footer">🕐 <span id="footerTime">—</span> · 每30s刷新</div>
</div>
<script>
const DK="sk-9e4…98a9";
const AT = 'Bea' + 'rer ' + DK;
var II=[{t:"2026-07-21T07:04:00Z",b:9.37},{t:"2026-07-21T07:26:00Z",b:9.12},{t:"2026-07-21T07:37:00Z",b:9.01},{t:"2026-07-21T07:47:00Z",b:8.81},{t:"2026-07-21T08:05:00Z",b:8.33},{t:"2026-07-21T08:15:00Z",b:7.89},{t:"2026-07-21T08:33:00Z",b:7.80},{t:"2026-07-21T08:47:00Z",b:7.34},{t:"2026-07-21T10:27:00Z",b:5.35},{t:"2026-07-21T11:04:00Z",b:5.28}];
var H=[];try{var s=localStorage.getItem('dh');H=s?JSON.parse(s):JSON.parse(JSON.stringify(II));localStorage.setItem('dh',JSON.stringify(H))}catch(e){H=JSON.parse(JSON.stringify(II))}
function sv(){try{localStorage.setItem('dh',JSON.stringify(H))}catch(e){}}
function gb(t,p){var b=p[0].b;for(var i=0;i<p.length;i++){if(p[i].t<=t)b=p[i].b;else break}return b}
function rd(ba){
var bl=ba||H[H.length-1].b,f=H[0].b,ft=new Date(H[0].t).getTime(),n=Date.now();
document.getElementById('balDisplay').textContent='¥'+bl.toFixed(2);
document.getElementById('balUpdate').textContent=ba?'🔴 '+new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}):'⚫ 缓存';
document.getElementById('totalDisplay').textContent='¥'+Math.max(0,f-bl).toFixed(2);
document.getElementById('metaInfo').textContent='🔴 实时 · '+H.length+' 条';
document.getElementById('infoGrid').innerHTML='<div class="info-card"><div class="il">模型</div><div class="iv">deepseek-v4-flash</div></div><div class="info-card"><div class="il">快照</div><div class="iv">'+H.length+'</div></div><div class="info-card"><div class="il">首次</div><div class="iv">'+new Date(ft).toLocaleTimeString('zh-CN',{timeZone:'Asia/Shanghai'})+'</div></div>';
var ps=H.map(function(h){return{t:new Date(h.t).getTime(),b:h.b}});
if(ba!=null&&Date.now()-ps[ps.length-1].t>10000)ps.push({t:Date.now(),b:bl});
ps.sort(function(a,b){return a.t-b.t});
var f2=ps[0].t,s2=Math.floor(f2/600000)*600000,e2=Math.ceil(Date.now()/600000)*600000,rs=[],md=0.01;
for(var t=s2;t<e2;t+=600000){var b1=gb(t,ps),b2=gb(t+600000,ps),dr=Math.max(0,b1-b2),lb=new Date(t).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Shanghai'});rs.push({l:lb,b:b1,d:dr});if(dr>md)md=dr}
var totalDrop=0,activeCnt=0;
for(var i=0;i<rs.length;i++){totalDrop+=rs[i].d;if(rs[i].d>0)activeCnt++}
document.getElementById('costDisplay').textContent='¥'+totalDrop.toFixed(2);
document.getElementById('costSub').textContent='≈ $'+(totalDrop/7.2).toFixed(4)+' · '+activeCnt+' 个时段';
document.getElementById('hoursDisplay').textContent=(activeCnt*10)+'分钟';
document.getElementById('hoursSub').textContent='有消费的时段 ×10 分钟';
var hh='';
if(rs[0]){hh+='<div class="bar-row bar-row-0"><div class="bar-bal" style="color:#555">¥'+rs[0].b.toFixed(2)+'</div><div class="bar-time" style="color:#555">'+rs[0].l+'</div><div class="bar-track-wrap"></div><div class="bar-drop" style="color:#444">—</div></div>'}
for(var i=1;i<rs.length;i++){var r=rs[i];if(r.d<=0)continue;var w=Math.max(4,(r.d/md)*280),cl=r.d>0.15?'#f59e0b':r.d>0.05?'#eab308':'#4ade80';hh+='<div class="bar-row"><div class="bar-bal" style="color:'+cl+'">¥'+r.b.toFixed(2)+'</div><div class="bar-time" style="color:#888">'+r.l+'</div><div class="bar-track-wrap"><div class="bar-fill" style="width:'+w+'px;background:'+cl+'"></div></div><div class="bar-drop" style="color:'+cl+'">¥'+r.d.toFixed(2)+'</div></div>'}
document.getElementById('chartArea').innerHTML=hh}

function fb(){
  fetch('https://api.deepseek.com/user/balance',{headers:{'Authorization':AT}})
  .then(function(r){if(!r.ok)throw Error();return r.json()})
  .then(function(d){
    if(d.is_available&&d.balance_infos&&d.balance_infos.length>0){
      var b=parseFloat(d.balance_infos[0].total_balance),l=H[H.length-1];
      if(!l||Math.abs(l.b-b)>0.001||Date.now()-new Date(l.t).getTime()>120000){
        H.push({t:new Date().toISOString(),b:b});
        if(H.length>200)H=H.slice(-200);sv()
      }
      rd(b)
    }
  }).catch(function(){rd()})
}
fb();setInterval(fb,30000);
setInterval(function(){var d=new Date();document.getElementById('footerTime').textContent=d.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})},1000);
</script>
</body>
</html>
