<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海 · 浙江 实时天气</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  
  :root {
    --bg: #0b1120;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
    --text: #e8edf5;
    --text-secondary: #8892a4;
    --accent: #60a5fa;
    --accent-gradient: linear-gradient(135deg, #60a5fa, #a78bfa);
    --sh-accent: #f59e0b;
    --sh-gradient: linear-gradient(135deg, #f59e0b, #ef4444);
    --zj-accent: #10b981;
    --zj-gradient: linear-gradient(135deg, #10b981, #06b6d4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0.75rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 30%, rgba(245,158,11,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(16,185,129,0.05) 0%, transparent 50%);
    z-index: -1;
  }

  .container {
    max-width: 1100px;
    width: 100%;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .header .title {
    font-size: 1.6rem;
    font-weight: 700;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .time {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
  }

  /* Dual-city layout */
  .cities-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  /* City Card */
  .city-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 1.5rem;
    backdrop-filter: blur(12px);
  }
  .city-card.sh-card { border-top: 3px solid #f59e0b; }
  .city-card.zj-card { border-top: 3px solid #10b981; }

  .city-name {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .city-name.sh { color: #f59e0b; }
  .city-name.zj { color: #10b981; }
  .city-sub {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .weather-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .weather-temp {
    display: flex;
    align-items: baseline;
    gap: 0.25rem;
  }
  .weather-temp .temp {
    font-size: 3.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .weather-temp .unit {
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--text-secondary);
  }
  .weather-icon {
    font-size: 3.5rem;
    line-height: 1;
  }
  .weather-desc {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
  }
  .weather-feels {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  /* Details Grid */
  .details-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .detail-item {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 0.6rem 0.5rem;
    text-align: center;
  }
  .detail-item .label {
    font-size: 0.6rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }
  .detail-item .value {
    font-size: 0.95rem;
    font-weight: 600;
  }
  .detail-item .sub {
    font-size: 0.65rem;
    color: var(--text-secondary);
    margin-top: 0.1rem;
  }

  /* Forecast */
  .forecast {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 1.25rem;
    backdrop-filter: blur(12px);
    margin-bottom: 1rem;
  }
  .forecast-title {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
  }
  .forecast-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .fcity-title {
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .fcity-title.sh-fc { color: #f59e0b; }
  .fcity-title.zj-fc { color: #10b981; }
  .forecast-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .forecast-day {
    display: grid;
    grid-template-columns: 50px 1fr 30px 60px;
    align-items: center;
    padding: 0.4rem 0.5rem;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    gap: 0.3rem;
  }
  .forecast-day .day-name {
    font-weight: 500;
    font-size: 0.8rem;
  }
  .forecast-day .day-icon {
    text-align: center;
    font-size: 1.1rem;
  }
  .forecast-day .day-cond {
    font-size: 0.7rem;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .forecast-day .day-temps {
    text-align: right;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .forecast-day .day-temps .high { color: #f87171; }
  .forecast-day .day-temps .low { color: #60a5fa; }

  /* Loading / Error */
  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--text-secondary);
  }
  .loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 1.5rem;
    color: #f87171;
    font-size: 0.9rem;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 0.5rem 0;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
  }

  @media (max-width: 768px) {
    .cities-grid { grid-template-columns: 1fr; gap: 0.75rem; }
    .forecast-grid { grid-template-columns: 1fr; gap: 1rem; }
    .weather-temp .temp { font-size: 3rem; }
    .weather-icon { font-size: 3rem; }
    .city-card { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">🌤️ 上海 · 浙江 实时天气</div>
    <div class="time" id="updateTime">加载中...</div>
  </div>

  <!-- Dual City Cards -->
  <div class="cities-grid" id="citiesGrid">
    <!-- 上海 -->
    <div class="city-card sh-card">
      <div class="city-name sh">上海 Shanghai</div>
      <div class="city-sub" id="shSub">加载中...</div>
      <div class="loading" id="shLoading">
        <div class="spinner"></div>
      </div>
      <div id="shContent" style="display:none">
        <div class="weather-main">
          <div class="weather-temp">
            <span class="temp" id="shTemp">--</span>
            <span class="unit">°C</span>
          </div>
          <div class="weather-icon" id="shIcon">🌤️</div>
        </div>
        <div class="weather-desc" id="shDesc">--</div>
        <div class="weather-feels" id="shFeels">体感温度 --°C</div>
        <div class="details-grid">
          <div class="detail-item">
            <div class="label">💧 湿度</div>
            <div class="value" id="shHumidity">--%</div>
          </div>
          <div class="detail-item">
            <div class="label">💨 风速</div>
            <div class="value" id="shWind">--</div>
            <div class="sub" id="shWindDir">--</div>
          </div>
          <div class="detail-item">
            <div class="label">👁️ 能见度</div>
            <div class="value" id="shVis">-- km</div>
          </div>
          <div class="detail-item">
            <div class="label">🌅 日出</div>
            <div class="value" id="shSunrise">--</div>
          </div>
          <div class="detail-item">
            <div class="label">🌇 日落</div>
            <div class="value" id="shSunset">--</div>
          </div>
          <div class="detail-item">
            <div class="label">🌡️ 气压</div>
            <div class="value" id="shPressure">-- hPa</div>
          </div>
        </div>
      </div>
      <div class="error" id="shError" style="display:none">⚠️ 获取失败</div>
    </div>

    <!-- 浙江 -->
    <div class="city-card zj-card">
      <div class="city-name zj">浙江 Zhejiang</div>
      <div class="city-sub" id="zjSub">加载中...</div>
      <div class="loading" id="zjLoading">
        <div class="spinner"></div>
      </div>
      <div id="zjContent" style="display:none">
        <div class="weather-main">
          <div class="weather-temp">
            <span class="temp" id="zjTemp">--</span>
            <span class="unit">°C</span>
          </div>
          <div class="weather-icon" id="zjIcon">🌤️</div>
        </div>
        <div class="weather-desc" id="zjDesc">--</div>
        <div class="weather-feels" id="zjFeels">体感温度 --°C</div>
        <div class="details-grid">
          <div class="detail-item">
            <div class="label">💧 湿度</div>
            <div class="value" id="zjHumidity">--%</div>
          </div>
          <div class="detail-item">
            <div class="label">💨 风速</div>
            <div class="value" id="zjWind">--</div>
            <div class="sub" id="zjWindDir">--</div>
          </div>
          <div class="detail-item">
            <div class="label">👁️ 能见度</div>
            <div class="value" id="zjVis">-- km</div>
          </div>
          <div class="detail-item">
            <div class="label">🌅 日出</div>
            <div class="value" id="zjSunrise">--</div>
          </div>
          <div class="detail-item">
            <div class="label">🌇 日落</div>
            <div class="value" id="zjSunset">--</div>
          </div>
          <div class="detail-item">
            <div class="label">🌡️ 气压</div>
            <div class="value" id="zjPressure">-- hPa</div>
          </div>
        </div>
      </div>
      <div class="error" id="zjError" style="display:none">⚠️ 获取失败</div>
    </div>
  </div>

  <!-- Forecast -->
  <div class="forecast">
    <div class="forecast-title">📅 未来三天预报</div>
    <div class="forecast-grid">
      <div>
        <div class="fcity-title sh-fc">上海</div>
        <div id="shForecastLoading" class="loading" style="padding:1rem"><div class="spinner"></div></div>
        <div class="forecast-list" id="shForecastList" style="display:none"></div>
      </div>
      <div>
        <div class="fcity-title zj-fc">浙江</div>
        <div id="zjForecastLoading" class="loading" style="padding:1rem"><div class="spinner"></div></div>
        <div class="forecast-list" id="zjForecastList" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    数据来源: wttr.in · 每30分钟自动刷新
  </div>
</div>

<script>
const CITIES = {
  sh: { name: 'Shanghai', label: '上海' },
  zj: { name: 'Hangzhou', label: '浙江·杭州' }
};

const conditionMap = {
  'Sunny': '☀️', 'Clear': '🌙', 'Partly cloudy': '⛅', 'Cloudy': '☁️',
  'Overcast': '☁️', 'Mist': '🌫️', 'Fog': '🌫️', 'Light rain': '🌦️',
  'Moderate rain': '🌧️', 'Heavy rain': '🌧️', 'Thunderstorm': '⛈️',
  'Light snow': '🌨️', 'Moderate snow': '❄️', 'Heavy snow': '❄️',
  'Sleet': '🌨️', 'Light drizzle': '🌦️', 'Patchy rain possible': '🌦️',
  'Haze': '🌫️',
};

function getWeatherIcon(desc) {
  return conditionMap[desc] || '🌤️';
}

function formatTime(t) {
  if (!t) return '--';
  const h = t.padStart(4, '0');
  return h.slice(0, 2) + ':' + h.slice(2);
}

function getWindDir(deg) {
  const dirs = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
  return dirs[Math.round((parseInt(deg)||0) / 45) % 8] || '--';
}

function getDayName(dateStr, index) {
  if (index === 0) return '今天';
  if (index === 1) return '明天';
  if (index === 2) return '后天';
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return weekdays[new Date(dateStr).getDay()];
}

async function fetchWeather(cityKey) {
  const city = CITIES[cityKey].name;
  let res = await fetch(`https://wttr.in/${city}?format=j1`);
  if (!res.ok) res = await fetch(`https://api.wttr.in/${city}?format=j1`);
  return await res.json();
}

function renderCity(cityKey, data) {
  const p = cityKey; // prefix
  const cc = data.current_condition[0];
  const fc = data.weather;

  document.getElementById(`${p}Temp`).textContent = cc.temp_C || '--';
  document.getElementById(`${p}Desc`).textContent = cc.weatherDesc?.[0]?.value || '--';
  document.getElementById(`${p}Icon`).textContent = getWeatherIcon(cc.weatherDesc?.[0]?.value || '');
  document.getElementById(`${p}Feels`).textContent = `体感温度 ${cc.FeelsLikeC || '--'}°C`;
  document.getElementById(`${p}Humidity`).textContent = (cc.humidity || '--') + '%';
  document.getElementById(`${p}Wind`).textContent = (cc.windspeedKmph || '--') + ' km/h';
  document.getElementById(`${p}WindDir`).textContent = getWindDir(cc.winddirDegree);
  document.getElementById(`${p}Vis`).textContent = (cc.visibility || '--') + ' km';
  document.getElementById(`${p}Sunrise`).textContent = formatTime(cc.sunrise);
  document.getElementById(`${p}Sunset`).textContent = formatTime(cc.sunset);
  document.getElementById(`${p}Pressure`).textContent = (cc.pressure || '--') + ' hPa';
  document.getElementById(`${p}Sub`).textContent = `${CITIES[cityKey].label} · ${cc.weatherDesc?.[0]?.value || ''}`;

  document.getElementById(`${p}Loading`).style.display = 'none';
  document.getElementById(`${p}Content`).style.display = 'block';

  // Forecast
  const list = document.getElementById(`${p}ForecastList`);
  list.innerHTML = '';
  document.getElementById(`${p}ForecastLoading`).style.display = 'none';
  list.style.display = 'flex';

  fc.forEach((day, i) => {
    const desc = day.hourly?.[4]?.weatherDesc?.[0]?.value ||
                 day.hourly?.[2]?.weatherDesc?.[0]?.value ||
                 day.hourly?.[0]?.weatherDesc?.[0]?.value || '';
    const div = document.createElement('div');
    div.className = 'forecast-day';
    div.innerHTML = `
      <span class="day-name">${getDayName(day.date, i)}</span>
      <span class="day-icon">${getWeatherIcon(desc)}</span>
      <span class="day-cond">${desc}</span>
      <span class="day-temps"><span class="high">${day.maxtempC}°</span> <span class="low">${day.mintempC}°</span></span>
    `;
    list.appendChild(div);
  });
}

function handleError(cityKey) {
  document.getElementById(`${cityKey}Loading`).style.display = 'none';
  document.getElementById(`${cityKey}Error`).style.display = 'block';
  document.getElementById(`${cityKey}ForecastLoading`).style.display = 'none';
}

// Update timestamp
function updateTime() {
  const now = new Date();
  document.getElementById('updateTime').textContent =
    `更新于 ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

// Fetch both cities
async function loadAll() {
  updateTime();
  await Promise.allSettled([
    fetchWeather('sh').then(d => renderCity('sh', d)).catch(() => handleError('sh')),
    fetchWeather('zj').then(d => renderCity('zj', d)).catch(() => handleError('zj'))
  ]);
}

loadAll();
setInterval(loadAll, 30 * 60 * 1000);
</script>
</body>
</html>
