<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海天气 · 实时看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  
  :root {
    --bg: #0b1120;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
    --text: #e8edf5;
    --text-secondary: #8892a4;
    --accent: #60a5fa;
    --accent-gradient: linear-gradient(135deg, #60a5fa, #a78bfa);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Subtle animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(96,165,250,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(167,139,250,0.05) 0%, transparent 50%);
    z-index: -1;
  }

  .container {
    max-width: 640px;
    width: 100%;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .header .city {
    font-size: 2.8rem;
    font-weight: 800;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0.2rem 0;
  }
  .header .time {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  /* Main Weather Card */
  .main-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 1.25rem;
    backdrop-filter: blur(12px);
  }

  .weather-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .weather-temp {
    display: flex;
    align-items: baseline;
    gap: 0.25rem;
  }
  .weather-temp .temp {
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .weather-temp .unit {
    font-size: 2rem;
    font-weight: 300;
    color: var(--text-secondary);
  }
  .weather-icon {
    font-size: 4.5rem;
    line-height: 1;
  }
  .weather-desc {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
  }
  .weather-feels {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
  }

  /* Details Grid */
  .details-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }
  .detail-item {
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    padding: 1rem;
    text-align: center;
  }
  .detail-item .label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  .detail-item .value {
    font-size: 1.2rem;
    font-weight: 600;
  }
  .detail-item .sub {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 0.15rem;
  }

  /* Forecast */
  .forecast {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 1.5rem;
    backdrop-filter: blur(12px);
    margin-bottom: 1.25rem;
  }
  .forecast-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .forecast-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .forecast-day {
    display: grid;
    grid-template-columns: 80px 1fr 40px 80px;
    align-items: center;
    padding: 0.6rem 0.75rem;
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    gap: 0.5rem;
  }
  .forecast-day .day-name {
    font-weight: 500;
    font-size: 0.9rem;
  }
  .forecast-day .day-icon {
    text-align: center;
    font-size: 1.3rem;
  }
  .forecast-day .day-cond {
    font-size: 0.8rem;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .forecast-day .day-temps {
    text-align: right;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .forecast-day .day-temps .high { color: #f87171; }
  .forecast-day .day-temps .low { color: #60a5fa; }
  .temp-bar-wrap {
    display: flex;
    align-items: center;
    height: 100%;
  }
  .temp-bar {
    height: 5px;
    border-radius: 3px;
    background: linear-gradient(90deg, #60a5fa, #f87171);
    min-width: 4px;
    position: relative;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 1rem 0 0.5rem;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.2);
  }
  .footer a { color: rgba(255,255,255,0.3); text-decoration: none; }
  .footer a:hover { color: rgba(255,255,255,0.5); }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary);
  }
  .loading .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 2rem;
    color: #f87171;
  }

  @media (max-width: 480px) {
    .weather-temp .temp { font-size: 3.8rem; }
    .weather-icon { font-size: 3.5rem; }
    .details-grid { grid-template-columns: repeat(3, 1fr); }
    .detail-item { padding: 0.75rem; }
    .detail-item .value { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="city">上海 Shanghai</div>
    <div class="time" id="updateTime">加载中...</div>
  </div>

  <div class="main-card" id="mainCard">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>正在获取天气数据...</div>
    </div>
    <div id="weatherContent" style="display:none">
      <div class="weather-main">
        <div class="weather-temp">
          <span class="temp" id="temp">--</span>
          <span class="unit">°C</span>
        </div>
        <div class="weather-icon" id="weatherIcon">🌤️</div>
      </div>
      <div class="weather-desc" id="weatherDesc">--</div>
      <div class="weather-feels" id="feelsLike">体感温度 --°C</div>

      <div style="margin: 1.5rem 0 0.75rem; border-top: 1px solid rgba(255,255,255,0.06);"></div>

      <div class="details-grid" id="detailsGrid">
        <div class="detail-item">
          <div class="label">💧 湿度</div>
          <div class="value" id="humidity">--%</div>
        </div>
        <div class="detail-item">
          <div class="label">💨 风速</div>
          <div class="value" id="wind">--</div>
          <div class="sub" id="windDir">--</div>
        </div>
        <div class="detail-item">
          <div class="label">👁️ 能见度</div>
          <div class="value" id="visibility">--</div>
        </div>
        <div class="detail-item">
          <div class="label">🌅 日出</div>
          <div class="value" id="sunrise">--</div>
        </div>
        <div class="detail-item">
          <div class="label">🌇 日落</div>
          <div class="value" id="sunset">--</div>
        </div>
        <div class="detail-item">
          <div class="label">🌡️ 气压</div>
          <div class="value" id="pressure">--</div>
        </div>
      </div>
    </div>
    <div class="error" id="error" style="display:none">⚠️ 获取数据失败，请稍后重试</div>
  </div>

  <div class="forecast">
    <div class="forecast-title">📅 未来预报</div>
    <div id="forecastLoading" class="loading" style="padding:1.5rem">
      <div class="spinner"></div>
    </div>
    <div class="forecast-list" id="forecastList" style="display:none"></div>
  </div>

  <div class="footer">
    数据来源: wttr.in · 每30分钟自动刷新
  </div>
</div>

<script>
const CITY = 'Shanghai';

async function fetchWeather() {
  try {
    const res = await fetch(`https://wttr.in/${CITY}?format=j1`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    // fallback: try api.wttr.in
    const res = await fetch(`https://api.wttr.in/${CITY}?format=j1`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }
}

const conditionMap = {
  'Sunny': '☀️', 'Clear': '🌙', 'Partly cloudy': '⛅', 'Cloudy': '☁️',
  'Overcast': '☁️', 'Mist': '🌫️', 'Fog': '🌫️', 'Light rain': '🌦️',
  'Moderate rain': '🌧️', 'Heavy rain': '🌧️', 'Thunderstorm': '⛈️',
  'Light snow': '🌨️', 'Moderate snow': '❄️', 'Heavy snow': '❄️',
  'Sleet': '🌨️', 'Light drizzle': '🌦️', 'Patchy rain possible': '🌦️',
  'Haze': '🌫️',
};

function getWeatherIcon(desc) {
  return conditionMap[desc] || '🌤️';
}

function formatTime(t) {
  if (!t) return '--';
  const h = t.padStart(4, '0');
  return h.slice(0, 2) + ':' + h.slice(2);
}

function getWindDir(deg) {
  const dirs = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
  const idx = Math.round(deg / 45) % 8;
  return dirs[idx] || '--';
}

function getDayName(dateStr, index) {
  if (index === 0) return '今天';
  if (index === 1) return '明天';
  if (index === 2) return '后天';
  const d = new Date(dateStr);
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return weekdays[d.getDay()];
}

function render(data) {
  const cc = data.current_condition[0];
  const forecast = data.weather;

  // Current weather
  document.getElementById('temp').textContent = cc.temp_C || '--';
  document.getElementById('weatherDesc').textContent = cc.weatherDesc?.[0]?.value || '--';
  document.getElementById('weatherIcon').textContent = getWeatherIcon(cc.weatherDesc?.[0]?.value || '');
  document.getElementById('feelsLike').textContent = `体感温度 ${cc.FeelsLikeC || '--'}°C`;

  document.getElementById('humidity').textContent = (cc.humidity || '--') + '%';
  const windSpeed = cc.windspeedKmph || '--';
  document.getElementById('wind').textContent = windSpeed + ' km/h';
  document.getElementById('windDir').textContent = getWindDir(parseInt(cc.winddirDegree) || 0);

  const vis = cc.visibility || '--';
  document.getElementById('visibility').textContent = vis + ' km';

  document.getElementById('sunrise').textContent = formatTime(cc.sunrise);
  document.getElementById('sunset').textContent = formatTime(cc.sunset);
  document.getElementById('pressure').textContent = (cc.pressure || '--') + ' hPa';

  // Update time
  const now = new Date();
  document.getElementById('updateTime').textContent =
    `更新于 ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // Hide loading
  document.getElementById('loading').style.display = 'none';
  document.getElementById('weatherContent').style.display = 'block';

  // Forecast
  renderForecast(forecast);
}

function renderForecast(forecast) {
  const list = document.getElementById('forecastList');
  list.innerHTML = '';
  document.getElementById('forecastLoading').style.display = 'none';
  list.style.display = 'flex';

  forecast.forEach((day, i) => {
    const desc = day.hourly?.[4]?.weatherDesc?.[0]?.value ||
                 day.hourly?.[2]?.weatherDesc?.[0]?.value ||
                 day.hourly?.[0]?.weatherDesc?.[0]?.value || '';
    const icon = getWeatherIcon(desc);
    const high = day.maxtempC || '--';
    const low = day.mintempC || '--';

    const div = document.createElement('div');
    div.className = 'forecast-day';
    div.innerHTML = `
      <span class="day-name">${getDayName(day.date, i)}</span>
      <span class="day-icon">${icon}</span>
      <span class="day-cond">${desc}</span>
      <span class="day-temps"><span class="high">${high}°</span> <span class="low">${low}°</span></span>
    `;
    list.appendChild(div);
  });
}

// Initial load
fetchWeather()
  .then(render)
  .catch(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  });

// Auto-refresh every 30 minutes
setInterval(() => {
  fetchWeather()
    .then(render)
    .catch(() => {});
}, 30 * 60 * 1000);
</script>
</body>
</html>
